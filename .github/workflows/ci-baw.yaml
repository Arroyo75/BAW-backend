name: CI - BAW Services

on:
  push:
    branches: [ main ]
    paths:
      - 'user-service/**'
      - 'dog-service/**'
      - 'rating-service/**'
      - 'api-gateway/**'
      - '.github/workflows/ci-baw.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'user-service/**'
      - 'dog-service/**'
      - 'rating-service/**'
      - 'api-gateway/**'
      - '.github/workflows/ci-baw.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: user-service
            helm-key: userService
          - service: dog-service
            helm-key: dogService
          - service: rating-service
            helm-key: ratingService
          - service: api-gateway
            helm-key: apiGateway
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn clean verify

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  owasp:
    name: OWASP Dependency Check - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: user-service
          - service: dog-service
          - service: rating-service
          - service: api-gateway
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run OWASP Dependency Check
        run: mvn dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }} -DossindexAnalyzerEnabled=false

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report-${{ matrix.service }}
          path: ${{ matrix.service }}/target/dependency-check-report.html

  trivy:
    name: Container Scanning - ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        include:
          - service: user-service
          - service: dog-service
          - service: rating-service
          - service: api-gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t baw/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: baw/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  sbom:
    name: Generate SBOM - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - service: user-service
          - service: dog-service
          - service: rating-service
          - service: api-gateway
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate SBOM
        run: mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: ${{ matrix.service }}/target/bom.xml

  push-image:
    name: Push to ghcr.io - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ build, trivy ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: user-service
            helm-key: userService
          - service: dog-service
            helm-key: dogService
          - service: rating-service
            helm-key: ratingService
          - service: api-gateway
            helm-key: apiGateway
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/baw-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-helm:
    name: Update Helm values - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - service: user-service
            helm-key: userService
          - service: dog-service
            helm-key: dogService
          - service: rating-service
            helm-key: ratingService
          - service: api-gateway
            helm-key: apiGateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "TAG=$TAG"
          echo "OWNER=$OWNER"
          sed -i "/${{ matrix.helm-key }}:/,/tag:/ s|tag:.*|tag: $TAG|" charts/baw/values.yaml
          sed -i "/${{ matrix.helm-key }}:/,/image:/ s|image:.*|image: ghcr.io\/$OWNER\/baw-${{ matrix.service }}|" charts/baw/values.yaml
          cat charts/baw/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash || true
          git pull --rebase origin main
          git stash pop || true
          git add charts/baw/values.yaml
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service }} image to $TAG"
          git push