name: CI - User Service

on:
  push:
    branches: [ main ]
    paths:
      - 'user-service/**'
      - '.github/workflows/ci-user-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'user-service/**'
      - '.github/workflows/ci-user-service.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      USER_SVC_DB_PASSWORD: ${{ secrets.USER_SVC_DB_PASSWORD }}
      DOG_SVC_DB_PASSWORD: ${{ secrets.DOG_SVC_DB_PASSWORD }}
      RATING_SVC_DB_PASSWORD: ${{ secrets.RATING_SVC_DB_PASSWORD }}
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
      SEED_OWNER_IDS: ${{ secrets.SEED_OWNER_IDS }}
    defaults:
      run:
        working-directory: user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Write RSA test keys
        run: |
          mkdir -p src/test/resources
          printf '%s' "$JWT_PRIVATE_KEY" > src/test/resources/test-private.pem
          printf '%s' "$JWT_PUBLIC_KEY"  > src/test/resources/test-public.pem

      - name: Build & Test
        run: mvn clean verify

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run OWASP Dependency Check
      run: mvn dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }} -DossindexAnalyzerEnabled=false

    - name: Upload OWASP Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: owasp-report-user-service
        path: user-service/target/dependency-check-report.html

  trivy:
    name: Container Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t baw/user-service:${{ github.sha }} ./user-service

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: baw/user-service:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: user-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate SBOM
        run: mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-user-service
          path: user-service/target/bom.xml