namespace: baw

postgres:
  image: postgres:15-alpine
  storage: 1Gi
  database: postgres

redis:
  image: redis:7-alpine
  storage: 512Mi

userService:
  image: ghcr.io/arroyo75/baw-user-service
  tag: sha-783f350
  port: 8081
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

dogService:
  image: ghcr.io/arroyo75/baw-dog-service
  tag: sha-783f350
  port: 8082
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

ratingService:
  image: ghcr.io/arroyo75/baw-rating-service
  tag: sha-783f350
  port: 8083
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

apiGateway:
  image: ghcr.io/arroyo75/baw-api-gateway
  tag: sha-783f350
  port: 8080
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

frontend:
  image: docker.io/library/baw-frontend
  tag: latest
  port: 80
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

ingress:
  className: nginx
  host: baw.local

probes:
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5
  startup:
    failureThreshold: 30
    periodSeconds: 10

securityContext:
  runAsUser: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

imagePullSecret: ghcr-secret

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70