apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.ratingService.replicas }}
  selector:
    matchLabels:
      app: rating-service
  template:
    metadata:
      labels:
        app: rating-service
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      containers:
        - name: rating-service
          image: {{ .Values.ratingService.image }}:{{ .Values.ratingService.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.ratingService.port }}
          resources:
            requests:
              memory: {{ .Values.ratingService.resources.requests.memory | quote }}
              cpu: {{ .Values.ratingService.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.ratingService.resources.limits.memory | quote }}
              cpu: {{ .Values.ratingService.resources.limits.cpu | quote }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/rating_service_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "rating_svc_user"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: RATING_SVC_DB_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.ratingService.port }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.ratingService.port }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.ratingService.port }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rating-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: rating-service
  ports:
    - port: {{ .Values.ratingService.port }}
      targetPort: {{ .Values.ratingService.port }}