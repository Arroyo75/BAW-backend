apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgresql-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/baw/postgresql
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/baw/postgresql
        property: POSTGRES_PASSWORD
    - secretKey: POSTGRES_DB
      remoteRef:
        key: secret/baw/postgresql
        property: POSTGRES_DB
    - secretKey: USER_SVC_DB_PASSWORD
      remoteRef:
        key: secret/baw/postgresql
        property: USER_SVC_DB_PASSWORD
    - secretKey: DOG_SVC_DB_PASSWORD
      remoteRef:
        key: secret/baw/postgresql
        property: DOG_SVC_DB_PASSWORD
    - secretKey: RATING_SVC_DB_PASSWORD
      remoteRef:
        key: secret/baw/postgresql
        property: RATING_SVC_DB_PASSWORD
---
