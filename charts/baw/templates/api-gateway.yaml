apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      containers:
        - name: api-gateway
          image: {{ .Values.apiGateway.image }}:{{ .Values.apiGateway.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.apiGateway.port }}
          resources:
            requests:
              memory: {{ .Values.apiGateway.resources.requests.memory | quote }}
              cpu: {{ .Values.apiGateway.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.apiGateway.resources.limits.memory | quote }}
              cpu: {{ .Values.apiGateway.resources.limits.cpu | quote }}
          env:
            - name: SPRING_DATA_REDIS_HOST
              value: "10.244.0.11"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: MANAGEMENT_HEALTH_REDIS_ENABLED
              value: "false"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.apiGateway.port }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.apiGateway.port }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.apiGateway.port }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
  labels:
    monitored: "true"
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: {{ .Values.apiGateway.port }}
      targetPort: {{ .Values.apiGateway.port }}