spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8081
              predicates:
                - Path=/api/users/**, /api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"
            - id: dog-service
              uri: http://dog-service:8082
              predicates:
                - Path=/api/dogs/**
            - id: rating-service
              uri: http://rating-service:8083
              predicates:
                - Path=/api/ratings/**
  data:
    redis:
      host: redis
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://user-service:8081/.well-known/jwks.json

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
    gateway:
      enabled: true

logging:
  level:
    root: WARN
    com.baw: INFO